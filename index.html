<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="Guía completa de las CoroCoro Promos de Pokémon (1996–2000). Precios actualizados de Mew, Mewtwo, Surfing Pikachu y más cartas promocionales japonesas.">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CoroCoro Promos 1996–2000 | Cartas Pokémon Japonesas">
  <meta name="twitter:description" content="Guía completa de las CoroCoro Promos de Pokémon (1996–2000). Precios actualizados de Mew, Mewtwo, Surfing Pikachu y más.">
  <meta name="twitter:image" content="https://coro-coro-collection.pages.dev/images/mew-card.png">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "CoroCoro Promos 1996–2000",
    "description": "Guía completa de las cartas promocionales de Pokémon publicadas en la revista CoroCoro Comic entre 1996 y 2000, con precios actualizados de CardMarket.",
    "url": "https://coro-coro-collection.pages.dev/",
    "inLanguage": "es",
    "about": {
      "@type": "Thing",
      "name": "Cartas Pokémon CoroCoro Promos",
      "description": "Cartas promocionales japonesas de Pokémon distribuidas a través de la revista CoroCoro Comic entre 1996 y 2000"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020617">
  <meta name="google-site-verification" content="0JnINzGgqZtTD56b7pEJr9_U2FEq6sopdEX1O9tQLJ0" />
</head>

<body>
<div class="app-container">
<!-- ============================== -->
<!-- 🧠 1. HEADER / TÍTULO -->
<!-- ============================== -->
<div class="hero">

  <div class="stars-container">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
  </div>

  
  <div class="pokeball"></div>

  <div class="particles"></div>

  <div class="hero-glow"></div>

  <img src="images/mew-card.png" class="hero-art" alt="Mew CoroCoro Promo carta Pokémon japonesa">
  <img src="images/purple-mew.png" class="hero-mew-right" alt="Mew ilustración decorativa">

  <div class="hero-center">
      <h1 class="hero-title"><span class="title-coro">CoroCoro</span> <span class="title-promos">Promos</span></h1>
      <div class="hero-sub">✦ 1996–2000 ✦</div>
    </div>

  <div class="hero-content">

    <button id="binderBtn" class="binder-btn">📕 Binder</button>

    <div class="stats">
      📦 <span id="total">0</span> cartas |
      ✅ <span id="completed">0</span> |
      📊 <span id="percent">0%</span>
    </div>

    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <div class="money-block">
      <div class="money-card">
        <div class="money-title">📉 Mercado</div>
        <div class="money-value" id="totalMin">0€</div>
      </div>
      <div class="money-card">
        <div class="money-title">💰 Gastado</div>
        <div class="money-value" id="totalSpent">0€</div>
      </div>
      <div class="money-card">
        <div class="money-title">💸 Ahorro</div>
        <div class="money-value" id="totalSaved">0€</div>
      </div>
    </div>

  </div>

</div>


<div class="legend-panel">
  <button id="toggleLegend">📘 Leyenda</button>

  <div id="legendBox" class="legend-box hidden">

  <div class="legend-item">
    💰 Mercado → precio actual del día
  </div>

  <div class="legend-item">
    📉 Registrado → precio anterior
  </div>

  <div class="legend-item">
    🛒 Comprada → marcar como tuya
  </div>

</div>
</div>

<!-- ============================== -->
<!-- 🏆 5. RANKING -->
<!-- ============================== -->

<div class="ranking-box">
  <div class="ranking-title">🏆 Mejores compras</div>
  <ul id="rankingList"></ul>
</div>

<!-- ============================== -->
<!-- 🎨 6. LEYENDA -->
<!-- ============================== -->

<div class="legend-box">

  <div class="legend-item">
    <div class="legend-dot sniper-dot"></div>
    SNIPER
  </div>

  <div class="legend-item">
    <div class="legend-dot good-dot"></div>
    GOOD
  </div>

  <div class="legend-item">
    <div class="legend-dot bad-dot"></div>
    BAD
  </div>

</div>

<!-- ============================== -->
<!-- 🔃 7. ACCIONES PRINCIPALES -->
<!-- ============================== -->


<div class="main-actions">
  <button id="sortBtn">🔃 Ordenar por mejores compras</button>
  <button id="updatePricesBtn">🔄 Actualizar precios</button>
  <span id="updateStatus" class="update-status"></span>
</div>

<!-- ============================== -->
<!-- 📜 8. HISTORIAL -->
<!-- ============================== -->

<div class="history-panel">

  <!-- 🔹 PANEL HISTORIAL -->
  <button id="toggleHistory">📜 Historial</button>

  <!-- 🔹 CONTENIDO -->
  <div id="historyBox" class="history-box hidden">

    <div class="history-actions">
      <button id="showHistory">👁 Ver</button>
      <button id="saveLog">💾 Guardar</button>
      <button id="showBought">🛒 Compradas</button>
    </div>
    <div class="history-actions backup-actions">
      <button id="exportData">📤 Exportar</button>
      <button id="importData">📥 Importar</button>
    </div>

    <div id="historyOutput"></div>

  </div>



</div>

<div id="boughtBox" class="history-box hidden"></div>

<!-- ============================== -->
<!-- 🧩 9. CARTAS -->
<!-- ============================== -->

<div id="cards-container" class="grid"></div>

<!-- 📕 BINDER VIEW -->
<div id="binderViewWrapper" class="hidden">

  <h2 class="binder-title">📕 Mi Binder</h2>

  <div id="binderView"></div>

</div>

<div id="zoomModal">
  <img id="zoomImg">
</div>


  <!-- 🔥 SCRIPT -->
  <script src="script.js"></script>


</div>
</body>
</html>
